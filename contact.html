<!DOCTYPE html>
<html lang="en">

<head>
<meta charset="UTF-8">

<title>Contact</title>

<link rel="stylesheet" href="style.css">
</head>

<body>

<header>

<h1>Contact</h1>

<nav aria-label="Primary Navigation">
<ul>
<li><a href="index.html">Home</a></li>
<li><a href="about.html">About</a></li>
<li><a href="projects.html">Projects</a></li>
<li><a href="contact.html">Contact</a></li>
</ul>
</nav>

</header>

<main>

<section aria-labelledby="contact">

<h2 id="contact">Contact Me</h2>

<form>

<label for="name">
Full Name
</label>

<input
type="text"
id="name"
required
aria-required="true">

<label for="email">
Email
</label>

<input
type="email"
id="email"
required
aria-required="true">

<label for="message">
Message
</label>

<textarea
id="message"
rows="5"
required
aria-required="true">
</textarea>

<button
type="submit"
aria-label="Submit Contact Form">
Send Message
</button>

</form>

</section>

</main>

<footer>
<p>&copy; 2026 Your Name</p>
</footer>

</body>
</html>
